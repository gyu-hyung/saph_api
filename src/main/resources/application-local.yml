# 로컬 개발 프로파일 — 인프라는 Docker, 앱은 로컬 실행
# 실행 방법: SPRING_PROFILES_ACTIVE=local ./gradlew bootRun
spring:
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/bako
    username: bako
    password: bako

  liquibase:
    url: jdbc:postgresql://localhost:5432/bako
    user: bako
    password: bako

  data:
    redis:
      host: localhost
      port: 6379

firebase:
  credentials:
    path: classpath:firebase-service-account.json

app:
  storage:
    videos-dir: ${STORAGE_BASE_DIR:./storage}/videos
    results-dir: ${STORAGE_BASE_DIR:./storage}/results
