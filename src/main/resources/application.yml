server:
  port: 8080

spring:
  profiles:
    active: local
  codec:
    max-in-memory-size: 10MB
  webflux:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  r2dbc:
    url: r2dbc:postgresql://postgres:5432/saph
    username: saph
    password: saph

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    url: jdbc:postgresql://postgres:5432/saph
    user: saph
    password: saph
    enabled: true

  data:
    redis:
      host: redis
      port: 6379

app:
  storage:
    videos-dir: ../../../../storage/videos
    results-dir: ../../../../storage/results
